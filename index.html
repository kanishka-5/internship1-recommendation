<!DOCTYPE html>
<html>

<head>
    <title>Internship Recommendation System</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>AI Internship Recommendation</h1>

<div class="container">

<label>Name</label>
<input type="text" id="name" placeholder="Enter your name">

<label>Skills</label>
<input type="text" id="skills" placeholder="Example: Java, Python">

<button onclick="recommendInternship()">Get Recommendation</button>

<h3 id="result"></h3>

</div>

<script src="script.js"></script>

</body>
</html>
